name: Build and Publish PDFs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          clean: true

      - name: Build all PDFs
        run: |
          find . -type f -name '*.tex' | while read -r tex; do
            docker run --rm \
              -v "$PWD:/build" \
              -w /build \
              shobanchiddarth/tectonic-resumebuilder-optimised-image:test-3 \
              "$tex"
          done

      - name: Publish PDFs to pdfs branch
        run: |
          set -e

          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"

          PDFS_DIR=/tmp/pdfs
          REPO_DIR=/tmp/pdfs-repo

          rm -rf "$PDFS_DIR" "$REPO_DIR"
          mkdir -p "$PDFS_DIR"

          find . -type f -name '*.pdf' | while read -r pdf; do
            mkdir -p "$PDFS_DIR/$(dirname "$pdf")"
            cp "$pdf" "$PDFS_DIR/$pdf"
          done

          REPO_URL=$(git remote get-url origin)

          git clone "$REPO_URL" "$REPO_DIR"
          cd "$REPO_DIR"

          if git show-ref --verify --quiet refs/remotes/origin/pdfs; then
            git checkout -B pdfs origin/pdfs
          else
            git checkout --orphan pdfs
            find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +
            git commit --allow-empty -m "Initialize pdfs branch"
            git push -u origin pdfs
          fi

          find . -mindepth 1 -maxdepth 1 ! -name ".git" -exec rm -rf {} +

          cp -r "$PDFS_DIR"/. .

          git add .

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "Update generated PDFs"
          git push origin pdfs

      - name: Mirror PDFs to local directory
        run: |
          OUTPUT_DIR="/home/gray/Documents/Resumes"

          rm -rf "$OUTPUT_DIR"
          mkdir -p "$OUTPUT_DIR"

          find . -type f -name '*.pdf' | while read -r pdf; do
            mkdir -p "$OUTPUT_DIR/$(dirname "$pdf")"
            cp "$pdf" "$OUTPUT_DIR/$pdf"
          done
